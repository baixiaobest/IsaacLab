seed: 42


# Models are instantiated using skrl's model instantiator utility
# https://skrl.readthedocs.io/en/latest/api/utils/model_instantiators.html
models:
  separate: True
  policy:  # see gaussian_model parameters
    class: GaussianMixin
    clip_actions: True
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: -2.0
    network:
      - name: net
        input: STATES
        layers: [256, 256, 128]
        activations: elu
    output: tanh(ACTIONS)
  critic_1:  # see deterministic_model parameters
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [256, 256, 128]
        activations: elu
    output: ONE
  critic_2:  # see deterministic_model parameters
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [256, 256, 128]
        activations: elu
    output: ONE
  target_critic_1:  # see deterministic_model parameters
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [256, 256, 128]
        activations: elu
    output: ONE
  target_critic_2:  # see deterministic_model parameters
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [256, 256, 128]
        activations: elu
    output: ONE


# Replay memory
# https://skrl.readthedocs.io/en/latest/api/memories/random.html
memory:
  class: RandomMemory
  memory_size: 100000


# SAC agent configuration (field names are from SAC_DEFAULT_CONFIG in skrl 1.4.x)
# https://skrl.readthedocs.io/en/latest/api/agents/sac.html
agent:
  class: SAC
  gradient_steps: 1
  batch_size: 30720
  discount_factor: 0.99
  polyak: 0.005
  actor_learning_rate: 3.0e-04
  critic_learning_rate: 3.0e-04
  entropy_learning_rate: 3.0e-04
  learning_rate_scheduler: null
  learning_rate_scheduler_kwargs: null
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  random_timesteps: 500
  learning_starts: 500
  grad_norm_clip: 1.0
  learn_entropy: True
  initial_entropy_value: 0.2
  target_entropy: null
  rewards_shaper_scale: 1.0
  # logging and checkpoint
  experiment:
    directory: "go2_obstacle_avoidance_navigation_sac"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: 500
    wandb: True


# Sequential trainer
# https://skrl.readthedocs.io/en/latest/api/trainers/sequential.html
trainer:
  class: SequentialTrainer
  timesteps: 200000
  environment_info: log
