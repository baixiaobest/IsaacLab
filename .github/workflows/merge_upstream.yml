name: Sync Fork with Upstream (IsaacLab) – Excluding Workflow Files

on:
  schedule:
    - cron: '0 18 * * 0'   # Sunday 18:00 UTC → Monday 2:00 AM Beijing
  workflow_dispatch:

permissions:
  contents: write   # only need write to code, not workflows

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/isaac-sim/IsaacLab.git
          git fetch upstream

      - name: Merge upstream changes (without workflow files)
        run: |
          # Merge upstream/main into your main branch
          if git merge upstream/main --no-edit --allow-unrelated-histories; then
            echo "Merge succeeded"
          else
            echo "Merge conflicts or error detected"
            git merge --abort
            exit 1
          fi

          # Discard any changes to .github/workflows/ (keep your versions)
          git reset HEAD -- .github/workflows/ 2>/dev/null || true
          git checkout -- .github/workflows/ 2>/dev/null || true
          git clean -fd .github/workflows/ 2>/dev/null || true

      - name: Push updates to your fork
        run: git push origin main
