name: Sync Fork with Upstream (IsaacLab)

# Grant additional permissions to the GITHUB_TOKEN
permissions:
  contents: write
  workflows: write

on:
  # Run every Sunday at 18:00 UTC → Monday 2:00 AM Beijing Time
  schedule:
    - cron: '0 18 * * 0'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your fork (baixiaobest/IsaacLab)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Merge from upstream IsaacLab
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_repo: isaac-sim/IsaacLab
          upstream_sync_branch: main
